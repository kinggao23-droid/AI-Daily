name: AI Daily Report

# 每天北京时间 09:00 = UTC 01:00 触发
# (cron 时区固定为 UTC, 不可改成 Asia/Shanghai)
on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:  # 支持手动触发, 方便测试

permissions:
  contents: write  # 允许 commit & push 生成的日报文件

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # 用默认 GITHUB_TOKEN, 后面 push 时会带 contents:write 权限
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate AI Daily reports
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-opus-4-7' }}
        run: |
          python3 generate_report.py

      - name: Commit & push generated reports
        run: |
          git config user.name "ai-daily-bot"
          git config user.email "ai-daily-bot@users.noreply.github.com"
          # 只有当文件有变化时才 commit
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            DATE_BJ=$(TZ=Asia/Shanghai date +%Y-%m-%d)
            git commit -m "chore: AI Daily ${DATE_BJ} (auto-generated)"
            git push
          fi
