name: Send Email Notification

on:
  push:
    branches:
      - main
    paths:
      - '*.md'
  schedule:
    - cron: '0 1 * * *'  # 每天UTC 1:00，即北京时间9:00

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic

      - name: Generate AI Daily report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_report.py

      - name: Commit and push report
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Add daily AI report $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push

  send-email:
    needs: generate-report
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: AI Daily Report Updated
          body: The AI Daily report has been updated. Check the latest changes at ${{ github.server_url }}/${{ github.repository }}/commits/${{ github.sha }}
          to: kinggao23@gmail.com
          from: GitHub Actions <noreply@github.com>